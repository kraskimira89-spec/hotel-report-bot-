# Reverse proxy Apache для bot.masterklepa.online → 127.0.0.1:4444
# На VPS уже работает Apache (:80). SSL — certbot --apache -d bot.masterklepa.online
#
# Установка:
#   sudo cp docker/apache-bot.example.conf /etc/apache2/sites-available/bot.masterklepa.online.conf
#   sudo a2enmod proxy proxy_http headers ssl
#   sudo a2ensite bot.masterklepa.online.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d bot.masterklepa.online

<VirtualHost *:80>
    ServerName bot.masterklepa.online

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:4444/
    ProxyPassReverse / http://127.0.0.1:4444/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ErrorLog ${APACHE_LOG_DIR}/bot.masterklepa.online-error.log
    CustomLog ${APACHE_LOG_DIR}/bot.masterklepa.online-access.log combined
</VirtualHost>
