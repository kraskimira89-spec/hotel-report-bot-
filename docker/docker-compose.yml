services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:4444:8000"
    env_file:
      - ../config/.env
    volumes:
      - ../data:/app/data
      - ../config:/app/config
      - ../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health'); assert r.status==200",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
