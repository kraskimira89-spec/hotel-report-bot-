# Пример reverse proxy для VPS (HTTPS :443 → app :8000).
# Сертификат: Let's Encrypt (certbot --nginx) или свой fullchain/privkey.
# После деплоя: MAX_WEBHOOK_URL=https://report-bot.1apart.ru/api/max/webhook

server {
    listen 80;
    server_name report-bot.1apart.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name report-bot.1apart.ru;

    ssl_certificate     /etc/letsencrypt/live/report-bot.1apart.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/report-bot.1apart.ru/privkey.pem;

    location /api/max/webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
