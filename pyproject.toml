[tool.basedpyright]
venvPath = "."
venv = ".venv"
pythonVersion = "3.11"

[tool.mypy]
python_version = "3.11"
mypy_path = "."
packages = ["src"]
exclude = ["(?x)(^\\.venv/|^docker/)"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "integration: живые сетевые/браузерные проверки (запускать вручную)",
]
