[tool.basedpyright]
venvPath = "."
venv = ".venv"
pythonVersion = "3.11"

[tool.mypy]
python_version = "3.11"
mypy_path = "."
packages = ["src"]
exclude = ["(?x)(^\\.venv/|^docker/)"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["scripts/_probe_*.py", "scripts/send_max_probe_summary.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
# Скрипты сначала правят sys.path, затем импортируют src.*
"scripts/*.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "integration: живые сетевые/браузерные проверки (запускать вручную)",
]
