# Скопируйте в config/settings.yaml и настройте под объект.
# Секреты (токены, пароли) — только в .env

# Режим dry-run: расчёт полный, отправка в тестовый чат/себе
dry_run: true

# Объект
property:
  total_units: 44          # квартир
  categories: 6          # категорий
  timezone: Europe/Moscow

# Расписание (Europe/Moscow)
scheduler:
  price_snapshot_cron: "0 9 * * *"       # ежедневно 09:00 — snapshot цен
  daily_summary_cron: "5 9 * * *"          # ежедневно 09:05 — сводка в Max
  weekly_email_cron: "0 8 * * 1"           # понедельник 08:00 — email-отчёт

# Хранение истории
storage:
  db_path: data/hotel_report.db
  retention_days: 90

# Пороги светофора (ежедневная сводка)
traffic_light:
  occupancy_green_min: 70    # % загрузки — зелёный от
  occupancy_yellow_min: 50   # % загрузки — жёлтый от
  price_change_yellow_pct: 5 # % отклонения цены — жёлтый
  price_change_red_pct: 10   # % отклонения цены — красный
  new_bookings_green_min: 3  # новых броней — зелёный от
  new_bookings_yellow_min: 1 # новых броней — жёлтый от

# Классификация каналов бронирования
channels_map:
  direct:
    - "1apart.ru"
    - "Сайт"
    - "Звонок"
    - "Телефон"
    - "WhatsApp"
    - "Telegram"
    - "Max"
  aggregator:
    - "Островок"
    - "Яндекс Путешествия"
    - "Авито"
    - "Суточно.ру"
    - "Booking.com"
    - "Ostrovok"

# Сбор цен с сайта 1apart.ru (статический HTML, БЕЗ Playwright)
# Цены на конкретные даты — TravelLine API (этап 7), здесь не собираются
site_prices:
  base_url: https://1apart.ru
  # Реальные slug категорий (ключ карточки = href). Цена берётся с главной,
  # эти slug нужны для сопоставления карточек с бизнес-категориями.
  category_urls:
    - /1room23
    - /1room
    - /uluchshennyie-odnokomnatnyie-kvartiryi
    - /odnokomnatnye-kvartiry-s-divanom
    - /2room
    - /luxe-kvartiry
  request_delay_min_sec: 2
  request_delay_max_sec: 3
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  backoff_initial_sec: 5
  backoff_max_sec: 60
  max_retries: 3
  robots_disallow_paths:
    - /manager/
  snapshot_cache_path: data/last_price_snapshots.json
  selectors:
    data_price: "[data-price]"
    price_value: ".price-value"
    price_from_regex: 'от\s*([\d\s\u00a0]+)\s*(?:руб|₽|Р|р\.?)'

# Конкуренты — цены собираются ТОЛЬКО для еженедельного email-отчёта (справочно).
# Собираются те же анти-блок правила, что и для site_prices.
# Загрузку конкурентов из открытых источников надёжно получить нельзя — только цены,
# где они доступны публично на сайте/виджете бронирования.
# type: direct — прямые конкуренты (гость выбирает между нами и ими),
#       indirect — классические отели на ту же аудиторию.
# Селекторы по каждому сайту уточняются на этапе 6/7 (см. market_trends.py).
# parser: static — цены в HTML (BeautifulSoup);
#         tl_widget — виджет TravelLine, автосбор через Playwright (context из HTML);
#         wubook_widget — виджет WuBook, автосбор через Playwright.
# Аудит и автосбор: docs/Этап_6-7_Аудит_конкурентов.md, docs/Этап_6-7_Автосбор_виджетов.md
competitors:
  # Прямые конкуренты
  - name: "Апартаменты Петровские"
    type: direct
    url: "https://apartment.tomsk.ru/"
    parser: static        # Tilda, цены в .t776__price-value
  - name: "Bon Apart (Банапарт)"
    type: direct
    url: "https://www.bon-apart.ru/"
    parser: tl_widget        # виджет TravelLine
  - name: "Центральный"
    type: direct
    url: "http://centraltomsk.ru/"   # работает только по http
    parser: tl_widget        # виджет TravelLine
  - name: "Гоголь"
    type: direct
    url: "https://gogolhotel.ru/"
    parser: static        # текст "Цена от N руб"
  # Косвенные конкуренты (отели на ту же аудиторию)
  - name: "Xander Hotel"
    type: indirect
    url: "https://xanderhotel.ru/ru/"
    parser: wubook_widget    # виджет WuBook (book.net), id 1706600472
  - name: "Кухтерин"
    type: indirect
    url: "https://kuhterinhotel.ru/catalog/catalog/"
    parser: static        # каталог, цены в .price
  - name: "Скандинавия"
    type: indirect
    url: "https://www.scandinaviahotel.ru/"
    parser: tl_widget        # виджет TravelLine
  - name: "Парад Парк"
    type: indirect
    url: "https://www.paradpark.ru/"
    parser: tl_widget        # виджет TravelLine/Bnovo
  - name: "Элегант"
    type: indirect
    url: "https://elegant-otel.ru/"
    parser: tl_widget        # виджет TravelLine; robots запрещает *.html

# Сбор новостей/трендов рынка для email-отчёта (3–5 пунктов/неделю)
market_news:
  enabled: true
  max_items: 5
  # источники (RSS/сайты) уточняются на этапе 6/7

# TravelLine API
travelline:
  webpms_base_url: https://api.travelline.ru
  reservation_base_url: https://api.travelline.ru
  property_id: ""  # ID объекта в TravelLine

# Max Bot API (секрет — см. .env MAX_TOKEN)
max_bot:
  api_url: https://platform-api2.max.ru
  chat_id: ""           # основной chat_id для отправки
  test_chat_id: ""      # chat_id для dry_run
  max_message_length: 4000  # лимит Max API

# Email (еженедельный отчёт)
email:
  from_address: reports@1apart.ru
  to_addresses:
    - manager@1apart.ru
  subject_prefix: "[1apart] Еженедельный отчёт"

# Google Sheets — таблица «Апарт отель для Сергея»
sheets:
  spreadsheet_id: "1tCPA1HeT5y48zvP3Gj9VG0Gpj9an0BG37Zn1_X69ehQ"  # из URL Google Sheets
  spreadsheet_title: "Апарт отель для Сергея"
  occupancy_sheet: "Заселяемость"
  occupancy_sheet_gid: 343939684        # gid листа заселяемости
  bookings_sheet: "Брони статистика"
  bookings_sheet_gid: 1469944608       # gid листа броней

# Веб-админка
web:
  host: 0.0.0.0
  port: 8000
  admin_username: admin
