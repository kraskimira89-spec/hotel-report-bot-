dry_run: true
property:
  total_units: 44
  categories: 6
  timezone: Europe/Moscow
scheduler:
  price_snapshot_cron: 0 9 * * *
  daily_summary_cron: 5 9 * * *
  weekly_email_cron: 0 8 * * 1
  weekly_trends_cron: 0 7 * * 1
  competitor_prices_cron: 30 9 * * 1
analytics:
  enabled: true
  period_days: 14
  refresh_cron: 15 9 * * *
  openai_model: gpt-4o-mini
  openai_base_url: https://api.openai.com/v1
deploy:
  enabled: false
  after_jobs: true
  min_interval_minutes: 15
  ssh_host: ''
  ssh_user: root
  app_dir: /opt/1apart/hotel-report-bot
  compose_file: docker/docker-compose.yml
  job_ids:
  - price_snapshot
  - daily_summary
  - weekly_email
  - weekly_trends
storage:
  db_path: data/hotel_report.db
  retention_days: 90
traffic_light:
  occupancy_green_min: 70
  occupancy_yellow_min: 50
  price_change_yellow_pct: 5
  price_change_red_pct: 10
  new_bookings_green_min: 3
  new_bookings_yellow_min: 1
channels_map:
  direct:
  - 1apart.ru
  - Сайт
  - Звонок
  - Телефон
  - WhatsApp
  - Telegram
  - Max
  aggregator:
  - Островок
  - Яндекс Путешествия
  - Авито
  - Суточно.ру
  - Booking.com
  - Ostrovok
site_prices:
  base_url: https://1apart.ru
  category_urls:
  - 1room23
  - 1room
  - uluchshennyie-odnokomnatnyie-kvartiryi
  - family-30
  - dvuxkomnatnyie-kvartiryi-(2-krovati)
  - 80m2-apartamentyi
  request_delay_min_sec: 2
  request_delay_max_sec: 3
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/124.0.0.0 Safari/537.36
  backoff_initial_sec: 5
  backoff_max_sec: 60
  max_retries: 3
  robots_disallow_paths:
  - /manager/
  snapshot_cache_path: data/last_price_snapshots.json
  selectors:
    data_price: '[data-price]'
    price_value: .price-value
    price_from_regex: от\s*([\d\s\u00a0]+)\s*(?:руб|₽|Р|р\.?)
category_slug_map:
  1room23: Однокомнатные квартиры 23 м²
  1room: Однокомнатные квартиры 27 м²
  uluchshennyie-odnokomnatnyie-kvartiryi: Улучшенные однокомнатные квартиры
  family-30: Однокомнатные квартиры с диванчиком
  dvuxkomnatnyie-kvartiryi-(2-krovati): Двухкомнатная квартира (2 кровати)
  dvuxkomnatnyie-kvartiryi-3: Двухкомнатная квартира (3 кровати)
  80m2-apartamentyi: Двухкомнатные квартиры люкс
room_type_aliases:
  Luxe: Люкс
competitors:
- name: Апартаменты Петровские
  type: direct
  url: https://apartment.tomsk.ru/
  parser: static
  selectors:
    name: .js-product-name
    price: .t776__price-value
- name: Bon Apart (Банапарт)
  type: direct
  url: https://www.bon-apart.ru/
  parser: tl_widget
- name: Центральный
  type: direct
  url: http://centraltomsk.ru/
  parser: tl_widget
- name: Гоголь
  type: direct
  url: https://gogolhotel.ru/
  parser: static
  selectors:
    price_regex: Цена от\s*([\d\s]+)\s*руб
- name: Xander Hotel
  type: indirect
  url: https://xanderhotel.ru/ru/
  parser: wubook_widget
- name: Кухтерин
  type: indirect
  url: https://kuhterinhotel.ru/catalog/catalog/
  parser: static
  selectors:
    price_block: .price
- name: Скандинавия
  type: indirect
  url: https://www.scandinaviahotel.ru/
  parser: tl_widget
- name: Парад Парк
  type: indirect
  url: https://www.paradpark.ru/
  parser: tl_widget
- name: Элегант
  type: indirect
  url: https://elegant-otel.ru/
  parser: tl_widget
competitor_category_map:
  Апартаменты Петровские: 1room
  Bon Apart (Банапарт): uluchshennyie-odnokomnatnyie-kvartiryi
  Центральный: 1room23
  Гоголь: 1room
  Xander Hotel: family-30
  Кухтерин: 1room23
  Скандинавия: dvuxkomnatnyie-kvartiryi-(2-krovati)
  Парад Парк: uluchshennyie-odnokomnatnyie-kvartiryi
  Элегант: family-30
market_news:
  enabled: true
  max_items: 5
  regions:
  - ru
  - world
  idea_category_priority: Технологии и ИИ
  idea_category_priorities:
  - Технологии и ИИ
  - Динамическое ценообразование / RMS
  - Прямые бронирования
  - Бесконтактный сервис
  - Длительное проживание / корпоративные гости
  - Гость-опыт и допуслуги
  - Рынок и регулирование
  sources:
  - https://hoteltechreport.com/feed/
  - https://www.hospitalitynet.org/rss/news.xml
travelline:
  partner_base_url: https://partner.tlintegration.com
  auth_url: https://partner.tlintegration.com/auth/token
  webpms_base_url: https://partner.tlintegration.com/api/webpms
  reservation_base_url: https://partner.tlintegration.com/api/read-reservation
  search_base_url: https://partner.tlintegration.com/api/search
  property_id: ''
  max_date_window_days: 31
  max_retries: 3
  backoff_initial_sec: 1
  backoff_max_sec: 60
  sheets_reconcile_threshold_pct: 10
  reservation_page_size: 100
max_bot:
  api_url: https://platform-api2.max.ru
  chat_id: ''
  test_chat_id: ''
  max_message_length: 4000
  max_retries: 3
  backoff_initial_sec: 1
  backoff_max_sec: 60
  webhook_url: ''
  webhook_update_types:
  - bot_started
  - message_created
  - bot_added
email:
  from_address: reports@1apart.ru
  to_addresses:
  - manager@1apart.ru
  test_addresses:
  - test@1apart.ru
  subject_prefix: '[1apart] Еженедельный отчёт'
sheets:
  spreadsheet_id: 1tCPA1HeT5y48zvP3Gj9VG0Gpj9an0BG37Zn1_X69ehQ
