dry_run: true
property:
  total_units: 44
  categories: 6
  timezone: Europe/Moscow
scheduler:
  price_snapshot_cron: 0 9 * * *
  daily_summary_cron: 5 9 * * *
  weekly_email_cron: 0 8 * * 1
  weekly_trends_cron: 0 7 * * 1
  competitor_prices_cron: 30 9 * * 1
  mail_inbox_cron: 45 9 * * *
mail_inbox:
  enabled: false
  lookback_days: 7
  report_senders:
  - noreply@travelline.ru
  - reports@travelline.ru
  - "@travelline.ru"
  mailboxes:
  - account: yandex
    enabled: false
    host: imap.yandex.ru
    port: 993
    folders:
    - INBOX
  - account: gmail
    enabled: false
    host: imap.gmail.com
    port: 993
    folders:
    - INBOX
analytics:
  enabled: true
  period_days: 14
  refresh_cron: 15 9 * * *
  openai_model: gpt-4o-mini
  openai_base_url: https://api.openai.com/v1
forecast:
  enabled: true
  horizons:
  - 7
  - 14
  - 30
  - 180
  min_history_days: 365
  max_mae_occupancy: 15
  max_mape_revenue: 20
  max_price_change_pct: 15
  min_price: 2000
  max_price: 25000
  use_competitors: true
  refresh_cron: 30 9 * * *
  manual_events:
  - name: День города Томска
    date_from: "2026-08-07"
    date_to: "2026-08-07"
    impact_pct: 8
events:
  enabled: true
  horizon_days: 30
  refresh_hour: 6
  refresh_interval_hours: 12
  require_approval_score: 60
  max_forecast_uplift: 0.15
  collect_cron: "0 6 * * *"
  notify_horizon_days: 14
  notify_min_impact: 80
  notify_min_overnight: 0.35
  classify_with_llm: true
  reclassify_other_on_collect: true
  guest_poster:
    default_days: 10
    max_cards: 10
    brand: 1APART
    headline: ЧТО ПОСЕТИТЬ В ТОМСКЕ
    address: Томск · 1apart
    wifi: ''
    contacts: https://1apart.ru
    disclaimer: Уточняйте наличие билетов у организатора
  sources:
  - name: tomsk_kassy
    url: https://tomsk.kassy.ru/
    type: html
    priority: 1
    enabled: true
  - name: ticketland_tomsk
    url: https://tomsk.ticketland.ru/
    type: html
    priority: 1
    enabled: true
  - name: tomsk_philharmonic
    url: https://tomskfil.ru/afisha/
    type: html
    priority: 1
    enabled: true
  - name: tusur_events
    url: https://tusur.ru/ru/novosti-i-meropriyatiya
    type: html
    priority: 1
    enabled: true
  - name: my_business_tomsk
    url: https://www.mb.tomsk.ru/meropriyatiya/
    type: html
    priority: 1
    enabled: true
    category: business
  - name: tomsk_sport_calendar
    url: https://sport-v-tomske.ru/calendar
    type: html
    priority: 1
    enabled: true
    category: sport
  - name: tomsk_region_events
    url: https://alsadm.gosuslugi.ru/
    type: html
    priority: 1
    enabled: true
    category: government
  - name: tomsk_library_events
    url: https://lib.tomsk.ru/sobytiya/
    type: html
    priority: 2
    enabled: true
    category: culture
  - name: ria_tomsk_events
    url: https://www.riatomsk.ru/
    type: html
    priority: 3
    enabled: true
    category: media
    verification_only: true
deploy:
  enabled: false
  after_jobs: true
  min_interval_minutes: 15
  ssh_host: ''
  ssh_user: root
  app_dir: /opt/1apart/hotel-report-bot
  compose_file: docker/docker-compose.yml
  job_ids:
  - price_snapshot
  - daily_summary
  - weekly_email
  - weekly_trends
storage:
  db_path: data/hotel_report.db
  retention_days: 730
traffic_light:
  occupancy_green_min: 70
  occupancy_yellow_min: 50
  price_change_yellow_pct: 5
  price_change_red_pct: 10
  new_bookings_green_min: 3
  new_bookings_yellow_min: 1
channels_map:
  direct:
  - 1apart.ru
  - Сайт
  - Звонок
  - Телефон
  - WhatsApp
  - Telegram
  - Max
  aggregator:
  - Островок
  - Яндекс Путешествия
  - Авито
  - Суточно.ру
  - Booking.com
  - Ostrovok
site_prices:
  base_url: https://1apart.ru
  category_urls:
  - 1room23
  - 1room
  - uluchshennyie-odnokomnatnyie-kvartiryi
  - family-30
  - dvuxkomnatnyie-kvartiryi-(2-krovati)
  - 80m2-apartamentyi
  request_delay_min_sec: 2
  request_delay_max_sec: 3
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/124.0.0.0 Safari/537.36
  backoff_initial_sec: 5
  backoff_max_sec: 60
  max_retries: 3
  robots_disallow_paths:
  - /manager/
  snapshot_cache_path: data/last_price_snapshots.json
  selectors:
    data_price: '[data-price]'
    price_value: .price-value
    price_from_regex: от\s*([\d\s\u00a0]+)\s*(?:руб|₽|Р|р\.?)
category_slug_map:
  1room23: Однокомнатные квартиры 23 м²
  1room: Однокомнатные квартиры 27 м²
  uluchshennyie-odnokomnatnyie-kvartiryi: Улучшенные однокомнатные квартиры
  family-30: Однокомнатные квартиры с диванчиком
  dvuxkomnatnyie-kvartiryi-(2-krovati): Двухкомнатная квартира (2 кровати)
  dvuxkomnatnyie-kvartiryi-3: Двухкомнатная квартира (3 кровати)
  80m2-apartamentyi: Двухкомнатные квартиры люкс
room_type_aliases:
  Luxe: Люкс
competitors:
- name: Апартаменты Петровские
  type: direct
  url: https://apartment.tomsk.ru/
  parser: static
  selectors:
    name: .js-product-name
    price: .t776__price-value
- name: Bon Apart (Банапарт)
  type: direct
  url: https://www.bon-apart.ru/
  booking_url: https://www.bon-apart.ru/booking/
  parser: tl_widget
- name: Центральный
  type: direct
  url: http://centraltomsk.ru/
  catalog_url: http://centraltomsk.ru/rooms/
  booking_url: http://centraltomsk.ru/booking/
  parser: tl_widget
- name: Гоголь
  type: direct
  url: https://gogolhotel.ru/
  parser: static
  selectors:
    price_regex: Цена от\s*([\d\s]+)\s*руб
- name: Xander Hotel
  type: indirect
  url: https://xanderhotel.ru/ru/
  catalog_url: https://xanderhotel.ru/ru/nomera-i-tseny.html
  parser: wubook_widget
- name: Кухтерин
  type: indirect
  url: https://kuhterinhotel.ru/catalog/catalog/
  parser: static
  selectors:
    price_block: .price
- name: Скандинавия
  type: indirect
  url: https://www.scandinaviahotel.ru/
  parser: tl_widget
- name: Парад Парк
  type: indirect
  url: https://www.paradpark.ru/
  parser: tl_widget
- name: Элегант
  type: indirect
  url: https://elegant-otel.ru/
  parser: tl_widget
competitor_category_map:
  Апартаменты Петровские: 1room
  Bon Apart (Банапарт): uluchshennyie-odnokomnatnyie-kvartiryi
  Центральный: 1room23
  Гоголь: 1room
  Xander Hotel: family-30
  Кухтерин: 1room23
  Скандинавия: dvuxkomnatnyie-kvartiryi-(2-krovati)
  Парад Парк: uluchshennyie-odnokomnatnyie-kvartiryi
  Элегант: family-30
