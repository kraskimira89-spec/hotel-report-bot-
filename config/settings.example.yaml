dry_run: false
property:
  total_units: 44
  categories: 6
  timezone: Europe/Moscow
scheduler:
  price_snapshot_cron: 0 9 * * *
  daily_summary_cron: 5 9 * * *
  weekly_email_cron: 0 8 * * 1
storage:
  db_path: data/hotel_report.db
  retention_days: 90
traffic_light:
  occupancy_green_min: 70
  occupancy_yellow_min: 50
  price_change_yellow_pct: 5
  price_change_red_pct: 10
  new_bookings_green_min: 3
  new_bookings_yellow_min: 1
channels_map:
  direct:
  - 1apart.ru
  - Сайт
  - Звонок
  - Телефон
  - WhatsApp
  - Telegram
  - Max
  aggregator:
  - Островок
  - Яндекс Путешествия
  - Авито
  - Суточно.ру
  - Booking.com
  - Ostrovok
site_prices:
  base_url: https://1apart.ru
  category_urls:
  - /1room23
  - /1room
  - /uluchshennyie-odnokomnatnyie-kvartiryi
  - /odnokomnatnye-kvartiry-s-divanom
  - /2room
  - /luxe-kvartiry
  request_delay_min_sec: 2
  request_delay_max_sec: 3
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/124.0.0.0 Safari/537.36
  backoff_initial_sec: 5
  backoff_max_sec: 60
  max_retries: 3
  robots_disallow_paths:
